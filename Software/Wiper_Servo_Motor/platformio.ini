; ============================================================
;  PlatformIO Configuration — RP2040 PWM Coprocessor
;
;  Targets the Raspberry Pi Pico (rpipico).
;  Change board to rpipico2 for Pico 2 / RP2350 — no other
;  changes needed.
;
;  Earle Philhower's arduino-pico platform is required.
;  Install via PlatformIO Registry or the URL below.
; ============================================================

[env:rpipico]
platform  = https://github.com/maxgerhardt/platform-raspberrypi.git
board     = rpipico
framework = arduino
board_build.core = earlephilhower

monitor_speed = 115200

build_flags =

upload_port  = noop
