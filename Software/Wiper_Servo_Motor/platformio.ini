; ============================================================
;  PlatformIO Configuration — RP2040 PWM Coprocessor
;
;  Earle Philhower's arduino-pico platform is required.
;  Install via PlatformIO Registry or the URL below.
;
; Adjust board type below:
; board     = rpipicow    (Pico W,   RP2040)
;   or
; board     = rpipico     (Pico,     RP2040)
;   or
; board     = rpipico2w   (Pico 2 W, RP2350)
;   or
; board     = rpipico2    (Pico 2,   RP2350)
; ============================================================

[env:rpipico]
platform  = https://github.com/maxgerhardt/platform-raspberrypi.git
board     = rpipicow
framework = arduino
board_build.core = earlephilhower

monitor_speed = 115200

lib_deps =
    https://github.com/adafruit/Adafruit-ST7735-Library.git
    https://github.com/adafruit/Adafruit-GFX-Library.git
    https://github.com/adafruit/Adafruit_BusIO.git

build_flags =

upload_port  = noop
